<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="color-scheme" content="light dark" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Glass Toasts • Top-Right</title>
<style>
:root{
  /* Layout & rhythm */
  --gap: 10px;
  --pad-y: 10px;
  --pad-x: 12px;
  --ico: 18px;
  --radius: 8px;
  --minw: 320px;  /* toast width range */
  --maxw: 420px;
  --line: 1.35;
  --rows: 2;
  --life: 5200ms;       /* visible time before collapse */
  --collapsedLife: 2600ms; /* life while collapsed (stripe visible) */
  --stagger: 260ms;
  --maxSimul: 4;        /* hard cap on visible toasts */
  --flashW: 5px;
  /* Color system (light) */
  --bg: color-mix(in oklab, #0a0c10 8%, #fff 92%);
  --bgGlass: color-mix(in oklab, var(--bg) 70%, transparent);
  --text: #0f172a;
  --muted: #334155;
  --border: color-mix(in oklab, #0a0c10 10%, #fff 90%);
  --edge: color-mix(in oklab, #000 7%, #fff 93%);
  --shadow: 0 8px 28px rgba(0,0,0,.22), 0 2px 10px rgba(0,0,0,.12);
  --ring: 0 0 0 1px color-mix(in oklab, #fff 50%, #000 50%) inset;
  /* Variants */
  --c-info: #0ea5e9;
  --c-success: #16a34a;
  --c-warning: #f59e0b;
  --c-danger: #ef4444;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg: #0f1216;
    --bgGlass: color-mix(in oklab, #111519 82%, transparent);
    --text: #e5e7eb;
    --muted: #a1aab5;
    --border: #1d232a;
    --edge: #242b33;
    --shadow: 0 8px 24px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.35);
    --ring: 0 0 0 1px rgba(255,255,255,.06) inset;
  }
}

/* Basic page */
*{box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
}
body{
  margin:0;
  font:14px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 800px at 90% -10%, color-mix(in oklab,#60a5fa 14%, transparent) 0, transparent 50%),
    radial-gradient(900px 700px at 120% 20%, color-mix(in oklab,#34d399 12%, transparent) 0, transparent 60%),
    radial-gradient(1000px 600px at 80% 120%, color-mix(in oklab,#fbbf24 10%, transparent) 0, transparent 60%),
    var(--bg);
}

/* Top utility row */
.util-bar{
  position: fixed;
  top: 10px; right: 10px; left: 10px;
  display: flex; align-items: center; gap: 10px; justify-content: space-between;
  pointer-events: none; /* only buttons get pointer events */
}

.notice{
  pointer-events: auto;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  color: var(--muted);
  background: color-mix(in oklab, var(--bgGlass) 90%, transparent);
  border: 1px solid var(--border);
  border-radius: 8px;
  backdrop-filter: blur(8px) saturate(140%);
  -webkit-backdrop-filter: blur(8px) saturate(140%);
  box-shadow: var(--ring);
  font-size: 12px;
}
.notice svg{ width:16px; height:16px; fill: currentColor; opacity:.8 }

/* Controls (mute + history) */
.controls{
  pointer-events: auto;
  display: flex; align-items: center; gap: 8px;
}
.icon-btn{
  position: relative;
  display: inline-grid; place-items:center;
  width: 36px; height: 32px;
  border-radius: 8px;
  background: var(--bgGlass);
  border: 1px solid var(--border);
  box-shadow: var(--ring);
  color: var(--muted);
  cursor: pointer;
  transition: transform .12s ease, background .12s ease, border-color .12s ease;
}
.icon-btn:hover{ transform: translateY(-1px); border-color: color-mix(in oklab, var(--muted) 30%, var(--border)); }
.icon-btn svg{ width:18px; height:18px; fill: currentColor; }
.badge{
  position:absolute; top:-6px; right:-6px;
  min-width:18px; height:18px; padding:0 5px;
  display:inline-grid; place-items:center;
  font-size:11px; font-weight:700;
  color:#fff; background:#0ea5e9; border-radius:999px;
  border:1px solid color-mix(in oklab,#000 25%, #0ea5e9 75%);
}

/* Right-edge flash when muted */
.edge-flash{
  position: fixed; top: 12px; right: 0;
  width: var(--flashW); height: 22px;
  border-radius: 3px 0 0 3px;
  opacity: 0; pointer-events: none;
  z-index: 99999;
  background: var(--c-info);
  filter: saturate(140%);
  transform: translateX(100%);
}
.edge-flash.show{ animation: edgeFlash 1400ms ease forwards; }
@keyframes edgeFlash{
  0% { opacity: 0; transform: translateX(0); }
  10%{ opacity: .95; }
  85%{ opacity: .75; }
  100%{ opacity: 0; transform: translateX(0); }
}

/* ===== Toast stack pinned to top-right (flush to edge) ===== */
.toast-area{
  position: fixed;
  top: 52px; /* below util bar */
  right: 0;
  display: flex; flex-direction: column; gap: var(--gap);
  z-index: 9999;
  pointer-events: none;
}

/* Toast (glassmorphism, flat, professional) */
.toast{
  pointer-events: auto;
  min-width: var(--minw); max-width: var(--maxw);
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  column-gap: 12px;

  padding: var(--pad-y) var(--pad-x);
  color: var(--text);
  border-radius: var(--radius) 0 0 var(--radius);
  border: 1px solid var(--border);
  border-right: 0;               /* flush with edge */
  background: var(--bgGlass);
  backdrop-filter: blur(10px) saturate(150%);
  -webkit-backdrop-filter: blur(10px) saturate(150%);
  box-shadow: var(--shadow), var(--ring);
  position: relative;
  overflow: clip;
  cursor: pointer;

  transform: translateX(100%);
  opacity: 0;
  animation: toastIn var(--life) cubic-bezier(.22,.9,.26,1) forwards;
}
.toast[data-order]{ animation-delay: calc(var(--stagger) * attr(data-order number, 0)); }

/* Accent strap on left for quick type recognition */
.toast::before{
  content:"";
  position:absolute; top:0; left:0; bottom:0; width:4px;
  background: currentColor; opacity:.95;
}

/* Icon */
.toast .ico{
  width: calc(var(--ico) + 2px); height: calc(var(--ico) + 2px);
  display:grid; place-items:center;
  color: currentColor;
}
.toast .ico svg{ width: var(--ico); height: var(--ico); fill: currentColor; display:block; }

/* Body */
.toast .body{
  display: grid; grid-template-rows: auto 1fr;
  min-block-size: calc(var(--line)*1em*var(--rows));
  line-height: var(--line);
  margin-right: 6px;
}
.toast .t{ font-weight: 700; letter-spacing:.2px; margin-bottom:2px; color: currentColor; }
.toast .m{ color: var(--muted); font-weight: 500; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; }

@keyframes toastIn{
  0%   { transform: translateX(100%); opacity: 0; }
  10%  { transform: translateX(0%);   opacity: 1; }
  100% { transform: translateX(0%);   opacity: 1; }
}
@keyframes toastOut{
  0%   { transform: translateX(0%);   opacity: 1; }
  100% { transform: translateX(100%); opacity: 0; }
}

/* Variants: set currentColor */
.toast.info    { color: var(--c-info); }
.toast.success { color: var(--c-success); }
.toast.warning { color: var(--c-warning); }
.toast.danger  { color: var(--c-danger); }

/* History panel (flyout) */
.history{
  position: fixed;
  top: 52px;
  right: 10px;
  width: min(520px, calc(100vw - 20px));
  max-height: calc(100vh - 70px);
  background: var(--bgGlass);
  border: 1px solid var(--border);
  border-radius: 10px;
  backdrop-filter: blur(10px) saturate(150%);
  -webkit-backdrop-filter: blur(10px) saturate(150%);
  box-shadow: var(--shadow), var(--ring);
  overflow: hidden;
  display:none;
  z-index: 9998;
}
.history.open{ display:block; }

.history header{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:10px 12px;
  border-bottom:1px solid var(--edge);
}
.history header h3{ margin:0; font-size:14px; letter-spacing:.2px; }
.history header .actions{ display:flex; gap:8px; }
.history .actions .small{
  font-size:12px; padding:6px 10px; border-radius:8px; cursor:pointer;
  background: color-mix(in oklab, var(--bgGlass) 90%, transparent);
  border:1px solid var(--border);
  color: var(--muted);
}
.history .actions .small:hover{ color: var(--text); border-color: color-mix(in oklab, var(--muted) 30%, var(--border)); }

.history .list{
  max-height: calc(100vh - 70px - 42px);
  overflow:auto;
}
.history .item{
  display:grid; grid-template-columns: 6px 1fr auto; align-items:center; gap:12px;
  padding:10px 12px;
  border-bottom:1px solid var(--edge);
}
.history .item .bar{ width:6px; height:100%; border-radius:4px; background: var(--c-info); }
.history .item .meta{ display:grid; grid-template-rows:auto auto; gap:2px; }
.history .item .meta .title{ font-weight:700; }
.history .item .meta .msg{ color: var(--muted); }
.history .time{ font-size:12px; color: var(--muted); }

.history .item.entering{
  animation: historyItemIn 320ms cubic-bezier(.22,.9,.26,1) both;
  transform-origin: top;
}
@keyframes historyItemIn{
  0%{ opacity:0; transform:translateY(-14px) scaleY(.85); }
  100%{ opacity:1; transform:translateY(0) scaleY(1); }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce){
  .toast{ animation: none !important; transform:none !important; opacity:1 !important; }
  .edge-flash{ animation: none !important; opacity:0 !important; }
}

/* Small helper demo area */
.demo{
  position:absolute;
  inset:0;
  display:grid;
  align-content:center;
  max-width:900px;
  width:100%;
  margin:auto;
  padding:72px 16px 24px;
  overflow:auto;
}
.demo h1{ font-size: clamp(22px, 3.5vw, 30px); margin: 0 0 10px; }
.demo p{ color: var(--muted); margin: 0 0 16px; }
.demo .row{ display:flex; flex-wrap: wrap; gap:8px; }
.demo .row button{
  padding: 8px 12px; border-radius:8px; border:1px solid var(--border); background: var(--bgGlass);
  color: var(--text); cursor:pointer;
}
.demo .row button:hover{ border-color: color-mix(in oklab, var(--muted) 30%, var(--border)); }
</style>
</head>
<body>

<!-- Top utility: notice + controls -->
<div class="util-bar">
  <div class="notice" title="Keyboard testing site — desktop only; OS key combos may be intercepted by your OS.">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 1 21h22L12 2Zm1 15h-2v-2h2v2Zm0-4h-2V9h2v4Z"/></svg>
    Desktop-focused experience. OS shortcuts (Win, Alt+Tab, etc.) may not be capturable by the browser.
  </div>

  <div class="controls">
    <!-- Mute toggle -->
    <button class="icon-btn" id="muteBtn" aria-label="Toggle toast mute" title="Mute / Unmute toasts">
      <svg id="bellOn"  viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2Zm6-6V11a6 6 0 1 0-12 0v5l-2 2v1h16v-1l-2-2Z"/></svg>
      <svg id="bellOff" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><path d="M18.7 16.9 21 19.2V20H3v-.8l2.3-2.3V11a7 7 0 0 1 9.4-6.6l1.5 1.5A5.5 5.5 0 0 0 6.8 11v6l-.9.9h11.8l.9-.9ZM12 22c.9 0 1.6-.7 1.9-1.5H10c.3.8 1 1.5 2 1.5Zm8.6-15.2-1.4-1.4-3.3 3.3 1.4 1.4 3.3-3.3Z"/></svg>
      <span class="badge" id="toastCount">0</span>
    </button>
    <!-- History toggle -->
    <button class="icon-btn" id="historyBtn" aria-label="Open toast history" title="Open toast history">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13 3a9 9 0 0 0-9 9H1l3.9 3.9L9 12H6a7 7 0 1 1 2.1 5l1.4-1.4A5 5 0 1 0 7 12h3l-4 4H4a9 9 0 1 0 9-13ZM11 8h2v6h-2z"/></svg>
    </button>
  </div>
</div>

<!-- Right-edge flash when muted -->
<div class="edge-flash" id="edgeFlash"></div>

<!-- Toast history panel -->
<aside class="history" id="historyPanel" aria-labelledby="historyTitle" role="dialog" aria-modal="false">
  <header>
    <h3 id="historyTitle">Notification History</h3>
    <div class="actions">
      <button class="small" id="clearHistory">Clear</button>
    </div>
  </header>
  <div class="list" id="historyList"></div>
</aside>

<!-- Toast stack -->
<div class="toast-area" id="toastArea" aria-live="polite" aria-atomic="true"></div>

<!-- Demo panel (optional; remove in production) -->
<section class="demo" aria-hidden="true">
  <h1>Toasts: glass + professional</h1>
  <p>Click to spawn sample toasts; click any visible toast to dismiss it, or open history to review notifications.</p>
  <div class="row">
    <button data-type="info">Spawn Info</button>
    <button data-type="success">Spawn Success</button>
    <button data-type="warning">Spawn Warning</button>
    <button data-type="danger">Spawn Error</button>
  </div>
</section>

<script>
/* Core toast system (no deps) */
(() => {
  const toastArea = document.getElementById('toastArea');
  const muteBtn   = document.getElementById('muteBtn');
  const bellOn    = document.getElementById('bellOn');
  const bellOff   = document.getElementById('bellOff');
  const countEl   = document.getElementById('toastCount');
  const edgeFlash = document.getElementById('edgeFlash');

  const historyPanel = document.getElementById('historyPanel');
  const historyBtn   = document.getElementById('historyBtn');
  const clearHistory = document.getElementById('clearHistory');
  const historyList  = document.getElementById('historyList');

  let muted = false;
  let queue = [];
  let active = [];         // active DOM nodes
  let history = [];        // {id,type,title,msg,time}
  let seq = 0;

  function setCount(n){ countEl.textContent = String(n); }

  function flashEdge(type){
    // Set color and animate a subtle right-edge flash when muted.
    const c = {
      info:    getComputedStyle(document.documentElement).getPropertyValue('--c-info').trim(),
      success: getComputedStyle(document.documentElement).getPropertyValue('--c-success').trim(),
      warning: getComputedStyle(document.documentElement).getPropertyValue('--c-warning').trim(),
      danger:  getComputedStyle(document.documentElement).getPropertyValue('--c-danger').trim()
    }[type] || '#0ea5e9';
    edgeFlash.style.background = c;
    edgeFlash.classList.remove('show');
    void edgeFlash.offsetWidth; // reflow
    edgeFlash.classList.add('show');
  }

  function enqueueToast(type, title, msg){
    const id = `t${Date.now()}_${seq++}`;
    const item = { id, type, title, msg, time: new Date() };
    history.unshift(item);
    setCount(history.length);
    if (historyPanel.classList.contains('open')){
      prependHistoryItem(item);
      return;
    }
    if (muted){
      flashEdge(type);
      // Do not show toast; silently keep in history.
      return;
    }
    queue.push(item);
    drain();
  }

  function drain(){
    // Ensure we never exceed max simultaneous toasts
    const maxSimul = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--maxSimul')) || 4;
    while (active.length < maxSimul && queue.length){
      spawn(queue.shift());
    }
  }

  function spawn(item){
    const n = document.createElement('div');
    n.className = `toast ${item.type}`;
    n.setAttribute('role','status');
    n.dataset.id = item.id;
    n.dataset.order = String(active.length); // for stagger
    n.style.setProperty('--life', getComputedStyle(document.documentElement).getPropertyValue('--life'));

    // Build inner DOM
    n.innerHTML = `
      <span class="ico" aria-hidden="true">${iconFor(item.type)}</span>
      <span class="body">
        <span class="t">${escapeHTML(item.title)}</span>
        <span class="m">${escapeHTML(item.msg)}</span>
      </span>
    `;

    // Clicking anywhere on the toast dismisses it immediately.
    n.addEventListener('click', () => removeToast(n));

    toastArea.prepend(n);
    active.unshift(n);

    // Auto-remove after its visible lifetime.
    const life = msVar('--life', 5200);
    n._removeTimer = setTimeout(() => removeToast(n), life);
  }

  function removeToast(n){
    if (!n || !toastArea.contains(n)) return;
    clearTimeout(n._removeTimer);
    n.style.animation = `toastOut 240ms ease forwards`;
    n.addEventListener('animationend', () => {
      const idx = active.indexOf(n);
      if (idx !== -1) active.splice(idx,1);
      n.remove();
      drain();
    }, { once:true });
  }

  function iconFor(type){
    const paths = {
      info:    '<path d="M12 2a10 10 0 1 0 .001 20.001A10 10 0 0 0 12 2Zm1 14h-2v-6h2v6Zm0-8h-2V7h2v2Z"/>',
      success: '<path d="M12 2a10 10 0 1 0 .001 20.001A10 10 0 0 0 12 2Zm-1.2 13.8-3.7-3.7 1.4-1.4 2.3 2.3 5.5-5.5 1.4 1.4-6.9 6.9Z"/>',
      warning: '<path d="M1 21h22L12 2 1 21Zm12-3h-2v-2h2v2Zm0-4h-2v-4h2v4Z"/>',
      danger:  '<path d="M12 2a10 10 0 1 0 .001 20.001A10 10 0 0 0 12 2Zm-1 13h2v2h-2v-2Zm0-8h2v6h-2V7Z"/>'
    };
    return `<svg viewBox="0 0 24 24" aria-hidden="true">${paths[type] || paths.info}</svg>`;
  }
  function escapeHTML(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function msVar(name, fallback){
    const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    if (!v) return fallback;
    if (v.endsWith('ms')) return parseFloat(v);
    if (v.endsWith('s')) return parseFloat(v)*1000;
    const n = parseFloat(v); return Number.isFinite(n) ? n : fallback;
  }

  /* Mute toggle */
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    bellOn.style.display  = muted ? 'none' : '';
    bellOff.style.display = muted ? '' : 'none';
  });

  /* History panel */
  historyBtn.addEventListener('click', () => {
    renderHistory();
    historyPanel.classList.add('open');
  });
  clearHistory.addEventListener('click', () => {
    history = [];
    setCount(0);
    renderHistory();
  });

  document.addEventListener('pointerdown', (e) => {
    if (!historyPanel.classList.contains('open')) return;
    if (historyPanel.contains(e.target) || historyBtn.contains(e.target)) return;
    historyPanel.classList.remove('open');
  });

  function historyItemHTML(h, extraClass = ''){
    const colorVar = ({
      info:'--c-info', success:'--c-success', warning:'--c-warning', danger:'--c-danger'
    }[h.type]||'--c-info');
    const time = h.time instanceof Date ? h.time : new Date(h.time);
    return `
      <div class="item ${extraClass}">
        <div class="bar" style="background: var(${colorVar})"></div>
        <div class="meta">
          <div class="title">${escapeHTML(h.title)}</div>
          <div class="msg">${escapeHTML(h.msg)}</div>
        </div>
        <div class="time" title="${time.toLocaleString()}">${time.toLocaleTimeString()}</div>
      </div>`;
  }

  function prependHistoryItem(item){
    const emptyState = historyList.querySelector('.item');
    if (history.length === 1 && emptyState) historyList.innerHTML = '';
    historyList.insertAdjacentHTML('afterbegin', historyItemHTML(item, 'entering'));
    const inserted = historyList.firstElementChild;
    inserted?.addEventListener('animationend', () => inserted.classList.remove('entering'), { once:true });
    historyList.scrollTop = 0;
  }

  function renderHistory(){
    historyList.innerHTML = history.map(h => historyItemHTML(h)).join('') || `<div class="item"><div class="bar" style="background:var(--c-info)"></div><div class="meta"><div class="title">No notifications yet</div><div class="msg">New toasts will appear here.</div></div><div class="time"></div></div>`;
  }

  /* Demo buttons */
  document.querySelectorAll('.demo [data-type]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const t = b.getAttribute('data-type');
      const title = {
        info:'Information', success:'Success', warning:'Warning', danger:'Error'
      }[t] || 'Info';
      const msg = {
        info:'Heads up—this is a concise informative message.',
        success:'Your action completed successfully.',
        warning:'Please review and confirm the highlighted settings.',
        danger:'We couldn’t complete that request. Try again.'
      }[t];
      enqueueToast(t, title, msg);
    });
  });

  /* Initial sample on load */
  setTimeout(()=>enqueueToast('info','Welcome','Toasts will appear here at the top-right.'), 600);

})();
</script>
</body>
</html>
